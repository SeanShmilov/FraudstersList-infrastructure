apiVersion: apps/v1
kind: Deployment
metadata:
  name: fifa-frontend-deployment
  namespace: fifa-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fifa-frontend
  template:
    metadata:
      labels:
        app: fifa-frontend
    spec:
      containers:
        - name: fifa-frontend
          image: 765858872029.dkr.ecr.us-east-1.amazonaws.com/fifaapp-frontend:29f5553
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: nginx-config-volume
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config-volume
          configMap:
            name: fifa-nginx-config
